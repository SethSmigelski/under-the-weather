name: Minify Assets

# This triggers the action manually from the Actions tab, 
# AND automatically whenever you push changes to an unminified CSS/JS file.
on:
  workflow_dispatch:
  push:
    paths:
      - '**.js'
      - '!**.min.js'
      - '**.css'
      - '!**.min.css'

# Required permission to allow the action to push commits back to your repo
permissions:
  contents: write

# Opt into the modern Node 24 runner environment
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  minify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Minify CSS files
        run: |
          # Find CSS files, ignore .min.css, and explicitly skip block builder folders
          find . -type f -name "*.css" ! -name "*.min.css" -not -path "*/src/*" -not -path "*/build/*" -not -path "*/node_modules/*" | while read -r file; do
            echo "Minifying $file..."
            npx --yes clean-css-cli -o "${file%.css}.min.css" "$file"
          done

      - name: Minify JS files
        run: |
          # Create a temporary Node script to strip whitespace from template literals
          cat << 'EOF' > strip-space.js
          const fs = require('fs');
          const file = process.argv[2];
          let code = fs.readFileSync(file, 'utf8');
          // Replace literal "\n" strings followed by spaces
          code = code.replace(/\\n\s+/g, '');
          // Replace actual newlines followed by spaces
          code = code.replace(/\n\s+/g, '');
          fs.writeFileSync(file, code);
          EOF

          # Find JS files, ignore .min.js, and explicitly skip block builder folders
          find . -type f -name "*.js" ! -name "*.min.js" -not -path "*/src/*" -not -path "*/build/*" -not -path "*/node_modules/*" | while read -r file; do
            echo "Minifying $file..."
            minfile="${file%.js}.min.js"
            npx --yes terser "$file" -o "$minfile" --compress --mangle
            
            # Run the cleanup script on the newly minified file
            node strip-space.js "$minfile"
          done
          
          # Delete the temporary script so it doesn't get committed
          rm strip-space.js

      - name: Commit and Push Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: Auto-minify CSS and JS assets"
          file_pattern: "**.min.css **.min.js"
